{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Forgot Password</h2>
                
                {% if not user %}
                <!-- Step 1: Identify User -->
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="Enter your username">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Next</button>
                </form>
                {% else %}
                <!-- Step 2: Answer Security Question -->
                <form method="POST">
                    <input type="hidden" name="username" value="{{ user.username }}">
                    <div class="mb-3">
                        <label class="form-label">Security Question</label>
                        <p class="form-control-plaintext border rounded p-2 bg-light">{{ user.security_question }}</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Security Answer</label>
                        <input type="text" name="security_answer" class="form-control" required placeholder="Your answer" autofocus>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Verify Answer</button>
                </form>
                {% endif %}
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
